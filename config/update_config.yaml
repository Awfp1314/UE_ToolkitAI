# 更新检测器配置文件

# API服务器配置
api:
  # API基础URL（生产环境 — Vercel）
  # 本地测试: http://localhost:5000/api/v2
  # 生产环境: https://www.unrealenginetookit.top/api/v2
  base_url: "https://www.unrealenginetookit.top/api/v2"
  # 请求超时时间（秒）— Vercel Serverless 冷启动可能较慢
  timeout: 8

# 版本配置
# 注意：此配置已弃用，版本号现在从 version.py 文件读取
# 如需修改版本号，请编辑项目根目录的 version.py 文件
version:
  # 当前程序版本号（此值会被 version.py 覆盖）
  current: "1.3.3"

# 更新检查配置
update_check:
  # 是否启用自动更新检查
  enabled: true
  # 是否在启动时检查更新
  check_on_startup: true

# 统计上报配置
statistics:
  # 是否启用统计上报
  enabled: true
  # 是否在启动时上报
  report_on_startup: true
