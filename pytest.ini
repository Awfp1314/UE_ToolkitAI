[pytest]
# Pytest configuration for UE_TOOKITS_AI_NEW

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=core
    --cov=modules
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    slow: Tests that take a long time to run
    qt: Tests that require PyQt6/QApplication
    thread: Tests involving threading/QThread
    config: Tests for configuration loading
    service: Tests for service layer
    module: Tests for application modules
    migration: Tests for migration tools

# Qt-specific settings (for pytest-qt)
qt_api = pyqt6

# Coverage settings
[coverage:run]
source = core,modules
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */migrations/*
    */scripts/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

